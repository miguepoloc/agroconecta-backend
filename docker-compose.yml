services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agroconecta
      POSTGRES_PASSWORD: agroconecta
      POSTGRES_DB: agroconecta
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agroconecta"]
      interval: 5s
      timeout: 5s
      retries: 5

  db_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agroconecta_test
      POSTGRES_PASSWORD: agroconecta_test
      POSTGRES_DB: agroconecta_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data

  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,ses,sqs,events,lambda,dynamodb
      - AWS_DEFAULT_REGION=us-east-1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  pgdata:
  localstack_data:
